<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q Tech Solutions - Industrial Engineering CRM</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231f2937' width='100' height='100'/><text x='50' y='65' font-size='60' font-weight='bold' fill='%23ffffff' text-anchor='middle' font-family='Arial'>Q</text></svg>" />
    <meta name="description" content="Industrial Engineering CRM for managing RFQs, orders, clients, and vendors" />
    <meta name="author" content="Q Tech Solutions" />

    <meta property="og:title" content="Q Tech Solutions - Industrial Engineering CRM" />
    <meta property="og:description" content="Industrial Engineering CRM for managing RFQs, orders, clients, and vendors" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@QTechSolutions" />

    <!-- Preconnect to Google Fonts servers so the connection is ready early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load font via <link> not CSS @import — avoids render-blocking -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- Apply saved theme before React mounts to prevent flash -->
    <script>
      (function() {
        var t = localStorage.getItem('qtcrm_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
